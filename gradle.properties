# Gradle Performance
org.gradle.jvmargs=-Xmx3g -Dkotlin.daemon.jvm.options\="-Xmx2048M" -Dfile.encoding=UTF-8

# KMP / iOS Configuration
xcodeproj=./iosApp

#Kotlin
kotlin.code.style=official

#MPP
kotlin.mpp.stability.nowarn=true
kotlin.mpp.enableCInteropCommonization=true
org.jetbrains.compose.experimental.uikit.enabled=true

# Android Compatibility (Required for AGP 9.x with monolithic KMP setup)
android.useAndroidX=true
android.builtInKotlin=false
android.newDsl=false
android.sourceset.disallowProvider=false
